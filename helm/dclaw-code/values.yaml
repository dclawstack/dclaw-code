app_id: code
replicaCount: 1

image:
  backend:
    repository: ghcr.io/dclawstack/dclaw-code-backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/dclawstack/dclaw-code-frontend
    tag: latest
    pullPolicy: IfNotPresent

service:
  backend:
    type: ClusterIP
    port: 8094
    targetPort: 8094
  frontend:
    type: ClusterIP
    port: 3005
    targetPort: 3005

ingress:
  enabled: false
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: code.dclawstack.io
      paths:
        - path: /api
          pathType: Prefix
          service: backend
          port: 8094
        - path: /
          pathType: Prefix
          service: frontend
          port: 3005
  tls:
    - secretName: code-dclawstack-io-tls
      hosts:
        - code.dclawstack.io

resources:
  backend:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "250m"
  frontend:
    limits:
      memory: "256Mi"
      cpu: "250m"
    requests:
      memory: "128Mi"
      cpu: "100m"

cloudnativepg:
  enabled: false
  name: dclaw-code-db
  instances: 1
  storage:
    size: 10Gi
  database: dclaw_code
  username: app

serviceAccount:
  create: true
  annotations: {}
  name: ""
