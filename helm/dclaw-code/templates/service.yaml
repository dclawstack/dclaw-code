apiVersion: v1
kind: Service
metadata:
  name: {{ include "dclaw-code.fullname" . }}-backend
  labels:
    app: {{ include "dclaw-code.name" . }}-backend
    {{- include "dclaw-code.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.backend.type }}
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "dclaw-code.name" . }}-backend
    {{- include "dclaw-code.selectorLabels" . | nindent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "dclaw-code.fullname" . }}-frontend
  labels:
    app: {{ include "dclaw-code.name" . }}-frontend
    {{- include "dclaw-code.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.frontend.type }}
  ports:
    - port: {{ .Values.service.frontend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: {{ include "dclaw-code.name" . }}-frontend
    {{- include "dclaw-code.selectorLabels" . | nindent 4 }}
